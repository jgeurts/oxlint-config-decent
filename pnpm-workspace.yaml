minimumReleaseAgeExclude:
  - semantic-release@25.0.6
# pnpm 11 reads settings from this file (.npmrc non-auth settings are ignored).
saveExact: true
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@0.2.5
  vite-plus: 0.2.4
overrides:
  vite: 'catalog:'
# eslint 10 is ahead of what some eslint-ecosystem plugins declare; the -compat
# plugins are only used syntactically via oxlint's JS-plugin runtime, so the
# mismatch is acceptable. typescript needs no rule: it resolves to the official
# @typescript/typescript6 compatibility package (TS 6.0 JS API), which satisfies
# typescript-eslint's peer range while tsc comes from TS 7 (@typescript/native).
peerDependencyRules:
  allowAny:
    - vite
  allowedVersions:
    eslint: '10'
    vite: '*'
